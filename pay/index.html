<body>
  <header class="cds-nav">
    <div class="cds-nav__inner">
      <a class="cds-nav__logo" href="https://cahayastore.me/" aria-label="Cahaya Store">
        <img src="https://cahayastore.me/assets/logo-light.png?v=3" alt="Cahaya Store" />
      </a>

      <div class="cds-nav__search-wrap">
        <form class="cds-nav__search" role="search" action="https://cahayastore.me/" method="get">

          <input type="search" name="q" placeholder="Cari produk digital..." autocomplete="off" />

        </form>
      </div>

      <div class="cds-nav__actions">
        <div class="cds-nav__group">
          <a class="cds-nav__icon" href="/riwayat" aria-label="Riwayat pesanan" title="Riwayat pesanan">

          </a>
          <button type="button" class="cds-nav__icon cds-nav__theme" data-theme-toggle aria-label="Ganti tema" aria-pressed="false" title="Mode gelap">
            <svg class="cds-nav__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            <svg class="cds-nav__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
          </button>
        </div>
        <span class="cds-nav__divider"></span>
        <div class="cds-nav__group">
          <a class="cds-nav__auth" href="/login" aria-label="Masuk atau Daftar">
            <span class="cds-nav__auth-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>

              <span class="cds-nav__auth-label">Daftar</span>
            </span>
          </a>
        </div>
      </div>
    </div>

    <div class="cds-nav__mobile-search">
      <form class="cds-nav__search" role="search" action="https://cahayastore.me/" method="get">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input type="search" name="q" placeholder="Cari produk digital..." autocomplete="off" />
      </form>
    </div>
  </header>

  <main class="container pay-main" data-pay>
    <div class="pay-skeleton">Memuat…</div>
  </main>

  <footer class="pd-footer">
    <div class="container">
      <span>© 2026 Cahaya Store.</span>
      <span class="payments">Pembayaran aman · QRIS · Transfer · E-wallet</span>
    </div>
  </footer>

  <script type="module" src="/scripts/pay.js?v=20260621-hidestock"></script>

</html>
