<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Settings - Cahaya Store Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #333;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: #333;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      resize: vertical;
    }
    textarea:focus {
      outline: none;
      border-color: #4CAF50;
    }
    .button-group {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-primary {
      background: #4CAF50;
      color: white;
    }
    .btn-primary:hover {
      background: #45a049;
    }
    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }
    .btn-secondary:hover {
      background: #e0e0e0;
    }
    .alert {
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 20px;
      display: none;
    }
    .alert.show {
      display: block;
    }
    .alert-success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .alert-error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .alert-info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .help-text {
      font-size: 13px;
      color: #666;
      margin-top: 6px;
    }
    .preview {
      margin-top: 30px;
      padding: 20px;
      background: #f9f9f9;
      border-radius: 4px;
      border: 1px solid #e0e0e0;
    }
    .preview h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #333;
    }
    .preview-content {
      background: white;
      padding: 15px;
      border-radius: 4px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚙️ Pengaturan Bot Telegram</h1>
    <p class="subtitle">Edit teks informasi yang ditampilkan ketika user klik tombol "Informasi" di bot</p>

    <div id="alert" class="alert"></div>

    <div id="loading" class="loading">
      <p>Memuat data...</p>
    </div>

    <div id="form-container" style="display: none;">
      <form id="settingsForm">
        <div class="form-group">
          <label for="infoText">Teks Informasi Bot</label>
          <textarea id="infoText" name="infoText" placeholder="Masukkan teks informasi..."></textarea>
          <div class="help-text">
            Gunakan HTML tags untuk formatting: &lt;b&gt;bold&lt;/b&gt;, &lt;i&gt;italic&lt;/i&gt;, &lt;code&gt;code&lt;/code&gt;
          </div>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-primary" id="saveBtn">💾 Simpan Perubahan</button>
          <button type="button" class="btn-secondary" id="resetBtn">🔄 Reset ke Default</button>
        </div>
      </form>

      <div class="preview">
        <h3>Preview:</h3>
        <div class="preview-content" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const SETTING_KEY = 'bot.info_text';
    const DEFAULT_TEXT = 'ℹ️ <b>Cahaya Store</b>\nPembayaran QRIS, produk dikirim instan setelah lunas.\nTekan tombol angka untuk lihat produk, lalu "Beli Sekarang".';

    const elements = {
      alert: document.getElementById('alert'),
      loading: document.getElementById('loading'),
      formContainer: document.getElementById('form-container'),
      form: document.getElementById('settingsForm'),
      infoText: document.getElementById('infoText'),
      preview: document.getElementById('preview'),
      saveBtn: document.getElementById('saveBtn'),
      resetBtn: document.getElementById('resetBtn')
    };

    function showAlert(message, type = 'info') {
      elements.alert.textContent = message;
      elements.alert.className = `alert alert-${type} show`;
      setTimeout(() => {
        elements.alert.classList.remove('show');
      }, 5000);
    }

    function updatePreview() {
      const text = elements.infoText.value || DEFAULT_TEXT;
      // Simple HTML rendering (be careful with XSS in production)
      elements.preview.innerHTML = text.replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/&lt;b&gt;/g, '<b>').replace(/&lt;\/b&gt;/g, '</b>')
        .replace(/&lt;i&gt;/g, '<i>').replace(/&lt;\/i&gt;/g, '</i>')
        .replace(/&lt;code&gt;/g, '<code>').replace(/&lt;\/code&gt;/g, '</code>');
    }

    async function loadSettings() {
      try {
        const response = await fetch(`${API_BASE}/api/admin/settings/${SETTING_KEY}`, {
          credentials: 'include'
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        
        if (data.success && data.value && data.value.text) {
          elements.infoText.value = data.value.text;
        } else {
          elements.infoText.value = DEFAULT_TEXT;
          showAlert('Belum ada pengaturan, menggunakan teks default', 'info');
        }

        updatePreview();
        elements.loading.style.display = 'none';
        elements.formContainer.style.display = 'block';
      } catch (error) {
        console.error('Load error:', error);
        elements.loading.innerHTML = `<p style="color: red;">❌ Gagal memuat data: ${error.message}</p>`;
      }
    }

    async function saveSettings(event) {
      event.preventDefault();
      
      elements.saveBtn.disabled = true;
      elements.saveBtn.textContent = '⏳ Menyimpan...';

      try {
        const response = await fetch(`${API_BASE}/api/admin/settings/${SETTING_KEY}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json'
          },
          credentials: 'include',
          body: JSON.stringify({
            value: {
              text: elements.infoText.value.trim() || DEFAULT_TEXT
            }
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        
        if (data.success) {
          showAlert('✅ Pengaturan berhasil disimpan!', 'success');
          updatePreview();
        } else {
          throw new Error('Save failed');
        }
      } catch (error) {
        console.error('Save error:', error);
        showAlert(`❌ Gagal menyimpan: ${error.message}`, 'error');
      } finally {
        elements.saveBtn.disabled = false;
        elements.saveBtn.textContent = '💾 Simpan Perubahan';
      }
    }

    function resetToDefault() {
      if (confirm('Reset ke teks default?')) {
        elements.infoText.value = DEFAULT_TEXT;
        updatePreview();
        showAlert('Teks direset ke default (belum disimpan)', 'info');
      }
    }

    // Event listeners
    elements.form.addEventListener('submit', saveSettings);
    elements.resetBtn.addEventListener('click', resetToDefault);
    elements.infoText.addEventListener('input', updatePreview);

    // Load on page load
    loadSettings();
  </script>
</body>
</html>
