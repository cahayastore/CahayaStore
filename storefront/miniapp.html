<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cahaya Store — Telegram Mini App</title>
  <meta name="description" content="Belanja produk digital Cahaya Store via Telegram" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/miniapp-standalone.css?v=20260613-cardclick" />
  <script src="/scripts/cds-theme.js?v=20260610-dark"></script>
  <script src="/scripts/mini-app.js?v=20260612-standalone"></script>
</head>
<body class="tma-body">
  <header class="tma-nav">
    <div class="tma-nav-inner">
      <a class="tma-logo" href="/miniapp.html" aria-label="Cahaya Store">
        <img src="/assets/logo-light.png?v=3" alt="Cahaya Store" />
      </a>
      <button type="button" class="tma-search-toggle" aria-label="Cari produk" data-search-toggle>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
      </button>
    </div>
    <div class="tma-search-wrap" data-search-wrap hidden>
      <form class="tma-search" role="search" action="/miniapp.html" method="get">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>
        <input type="search" name="q" placeholder="Cari produk digital..." autocomplete="off" data-search-input />
        <button type="submit" aria-label="Cari">Cari</button>
      </form>
    </div>
  </header>

  <main class="tma-main">
    <section class="tma-products">
      <div class="tma-section-head">
        <h2 class="tma-title">Produk</h2>
      </div>
      <div class="tma-product-grid" data-products></div>
      <div class="tma-empty" data-empty-state hidden>
        <b>Belum ada produk aktif</b>
      </div>
    </section>
  </main>

  <script type="module" src="/scripts/catalog.js?v=20260613-cardclick"></script>
  <script>
    // Mini app specific initialization
    (function() {
      const searchToggle = document.querySelector('[data-search-toggle]');
      const searchWrap = document.querySelector('[data-search-wrap]');
      const searchInput = document.querySelector('[data-search-input]');
      
      if (searchToggle && searchWrap) {
        searchToggle.addEventListener('click', (e) => {
          e.stopPropagation();
          const isHidden = searchWrap.hasAttribute('hidden');
          if (isHidden) {
            searchWrap.removeAttribute('hidden');
            searchToggle.classList.add('active');
            setTimeout(() => searchInput && searchInput.focus(), 100);
          } else {
            searchWrap.setAttribute('hidden', '');
            searchToggle.classList.remove('active');
          }
        });

        // Close on click outside
        document.addEventListener('click', (e) => {
          if (!searchWrap.hasAttribute('hidden') && 
              !searchWrap.contains(e.target) && 
              !searchToggle.contains(e.target)) {
            searchWrap.setAttribute('hidden', '');
            searchToggle.classList.remove('active');
          }
        });

        // Close on ESC
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && !searchWrap.hasAttribute('hidden')) {
            searchWrap.setAttribute('hidden', '');
            searchToggle.classList.remove('active');
          }
        });
      }

      // Route product card clicks to the mini app detail page.
      document.addEventListener('click', (e) => {
        if (e.target.closest('[data-wish]')) return; // let wishlist button work
        const card = e.target.closest('.product-card');
        if (!card) return;
        const link = card.querySelector('.pc-media[href]');
        const href = link ? (link.getAttribute('href') || '') : '';
        const m = href.match(/\/produk\/([^/?#]+)/i);
        if (!m) return;
        e.preventDefault();
        location.href = `/produk-tma.html?slug=${encodeURIComponent(m[1])}&tma=1`;
      });
    })();
  </script>
</body>
</html>
